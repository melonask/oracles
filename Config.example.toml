# Config.example.toml
#
# Example configuration for the `oracles` service.
#
# This file is intentionally verbose. Every important parameter has an
# explanatory comment so this file can be used both as a working example and as
# a configuration reference.
#
# Design principles:
# - the worker is stateless
# - previous accepted rates are read from the durable store
# - secrets are read from environment variables
# - suspicious rates are quarantined before they become active
# - notifications are event sinks, not validation logic
#
# Universal config model:
# - Root-level sections [stores], [http], [chains], [assets], [log],
#   [transports.http], and [transports.webhook] are shared reusable profiles.
# - Package-specific behavior lives under [oracles].
# - Unrelated package namespaces (e.g., [artur], [bria], [ladon], [pano]) are silently
#   ignored when using this file as a universal merged config.
# - Unknown fields within [oracles] are rejected with clear errors.

# Configuration schema version.
# Increase this only when the config format changes in a backward-incompatible way.
version = 1

# ─────────────────────────────────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────────────────────────────────

[log]
# Minimum log level.
# Allowed values: trace, debug, info, warn, error
level = "info"

# Log output format.
# `json` is recommended for containers and production.
# Allowed values: json, pretty, compact
format = "json"

# ─────────────────────────────────────────────────────────────────────────────
# Storage
# ─────────────────────────────────────────────────────────────────────────────
#
# Stores are external durable state.
#
# The `oracles` process itself should remain stateless. It may read and write
# to these stores, but it should not rely on local memory for correctness.

[stores.oracles]
# Database driver.
# Allowed values: sqlite, postgres
driver = "sqlite"

# Database connection URL.
#
# SQLite example:
# url = "sqlite://data/oracles.db"
#
# PostgreSQL example:
# url = "${ORACLES_DATABASE_URL}"
url = "sqlite://data/oracles.db"

# Whether `oracles` should automatically create/update its tables.
# Recommended: true for simple deployments.
# Set false if migrations are managed externally.
migrate = true

# Maximum time to wait when opening a database connection.
connect_timeout_secs = 10

# Maximum number of database connections.
# Both SQLite and PostgreSQL currently only support max_connections = 1.
# Connection pooling is not yet implemented.
max_connections = 1

# Optional PostgreSQL example:
#
# Note: PostgreSQL connection pooling is not yet implemented.
# max_connections must be 1 for PostgreSQL stores.
#
# [stores.oracles]
# driver = "postgres"
# url = "${ORACLES_DATABASE_URL}"
# migrate = true
# connect_timeout_secs = 10
# max_connections = 1

# ─────────────────────────────────────────────────────────────────────────────
# Shared HTTP defaults
# ─────────────────────────────────────────────────────────────────────────────

[http]
# User-Agent sent to external HTTP providers.
user_agent = "oracles/0.3"

# Maximum time to wait for one HTTP request.
request_timeout_secs = 15

# Maximum retry attempts for failed HTTP requests.
max_retries = 3

# Initial retry backoff in milliseconds.
# Implementations may apply exponential backoff from this value.
retry_backoff_ms = 500

# ─────────────────────────────────────────────────────────────────────────────
# Universal transport profiles (optional)
# ─────────────────────────────────────────────────────────────────────────────
#
# Transport profiles define reusable connection defaults. Providers reference
# HTTP profiles via `transport = "name"`. Event sinks reference webhook
# profiles via `transport = "name"`.

# [transports.http.default]
# Optional base URL for HTTP clients that can share one upstream endpoint.
# base_url = ""
# User-Agent override for this HTTP profile (empty = use [http].user_agent).
# user_agent = ""
# Request timeout in seconds (0 = use [http].request_timeout_secs).
# timeout_secs = 30
# Maximum retries (0 = use [http].max_retries).
# max_retries = 3
# Initial retry backoff in ms (0 = use [http].retry_backoff_ms).
# retry_base_ms = 500

# [transports.webhook.ops]
# Webhook destination URL (may use ${VAR} or ${VAR:-default} expansion).
# url = "${OPS_WEBHOOK_URL:-}"
# HTTP method for webhook delivery.
# method = "POST"
# Authentication scheme: none, bearer, or header.
# auth_scheme = "bearer"
# Token used when auth_scheme = bearer.
# token = "${OPS_WEBHOOK_TOKEN:-}"
# Header name used when auth_scheme = header.
# auth_header = "Authorization"
# Request timeout in seconds.
# timeout_secs = 10
# Maximum retry attempts.
# max_retries = 3
# Initial retry backoff in milliseconds.
# retry_base_ms = 500

# [transports.webhook.ops.headers]
# Default content-type header for JSON webhook deliveries.
# content_type = "application/json"

# ─────────────────────────────────────────────────────────────────────────────
# Chains
# ─────────────────────────────────────────────────────────────────────────────
#
# Chains provide shared metadata for assets.
#
# A price provider may be fully off-chain, but chain metadata is still useful
# for CAIP-2 identity, token addresses, x402 configuration, and future on-chain
# provider integrations.

[chains.eth]
# Chain family.
# Allowed examples: evm, solana, bitcoin
family = "evm"

# CAIP-2 chain identifier.
caip2 = "eip155:1"

# Native symbol of this chain.
native_symbol = "ETH"

# RPC endpoints for this chain.
# Multiple URLs may be used for fallback.
rpc_urls = ["https://eth.llamarpc.com"]

# Number of confirmations considered safe enough for chain-derived data.
confirmations = 12

[chains.base]
# Chain family.
family = "evm"

# CAIP-2 chain identifier.
caip2 = "eip155:8453"

# Native symbol of this chain.
native_symbol = "ETH"

# RPC endpoints for this chain.
rpc_urls = ["https://mainnet.base.org"]

# Number of confirmations considered safe enough for chain-derived data.
confirmations = 12

[chains.solana]
# Chain family.
family = "solana"

# CAIP-2 chain identifier.
caip2 = "solana:5eykt4UsFv8P8NJdTREpY1vzqKqZKvdp"

# Native symbol of this chain.
native_symbol = "SOL"

# RPC endpoints for this chain.
rpc_urls = ["https://api.mainnet-beta.solana.com"]

# Number of finalized confirmations/slots considered safe enough.
confirmations = 32

# ─────────────────────────────────────────────────────────────────────────────
# Assets
# ─────────────────────────────────────────────────────────────────────────────
#
# Asset table keys are stable internal IDs.
#
# Recommended naming:
# - eth
# - sol
# - usdc_base
# - usdc_eth
# - weth_base
#
# Do not rely only on ticker symbols, because the same symbol can exist on
# multiple chains.
#
# Shared assets provide identity metadata (chain, symbol, decimals, etc.).
# Oracle-specific feed configuration lives under [oracles.assets.<id>].
# When [oracles].asset_ids is set, only those shared assets are resolved.

[assets.eth]
# Whether this shared asset definition is active.
enabled = true

# Chain ID from the [chains] section.
chain = "eth"

# Human-readable ticker symbol.
symbol = "ETH"

# Human-readable asset name.
name = "Ether"

# Asset kind.
# Allowed examples: native, erc20, spl
kind = "native"

# Number of decimal places used by the asset.
decimals = 18

[assets.eth.x402]
# Whether x402/payment metadata is enabled for this asset.
enabled = true

# x402 asset address.
# For native EVM assets, this common pseudo-address can represent native ETH.
asset_address = "0xEeeeeEeeeEeEeeEeEeEeeEEEeeeeEeeeeeeeEEeE"

# Transfer method used by payment flows.
# Allowed examples: permit2, spl
transfer_method = "permit2"

[assets.usdc_base]
# Whether this asset is enabled.
enabled = true

# Chain ID from the [chains] section.
chain = "base"

# Human-readable ticker symbol.
symbol = "USDC"

# Human-readable asset name.
name = "USD Coin on Base"

# Asset kind.
kind = "erc20"

# ERC-20 contract address.
contract = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"

# Number of decimal places used by the asset.
decimals = 6

[assets.usdc_base.x402]
# Whether x402/payment metadata is enabled for this asset.
enabled = true

# x402 asset address.
asset_address = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"

# Transfer method used by payment flows.
transfer_method = "permit2"

[assets.sol]
# Whether this asset is enabled.
enabled = true

# Chain ID from the [chains] section.
chain = "solana"

# Human-readable ticker symbol.
symbol = "SOL"

# Human-readable asset name.
name = "Solana"

# Asset kind.
kind = "native"

# Number of decimal places used by the asset.
decimals = 9

[assets.sol.x402]
# Whether x402/payment metadata is enabled for this asset.
enabled = true

# SPL representation of SOL.
asset_address = "So11111111111111111111111111111111111111112"

# Transfer method used by payment flows.
transfer_method = "spl"

# ─────────────────────────────────────────────────────────────────────────────
# Oracles service
# ─────────────────────────────────────────────────────────────────────────────

[oracles]
# Store ID from the [stores] section.
store = "oracles"

# Quote currency used for rates.
quote = "USD"

# How often the background worker attempts to refresh rates.
# This is a scheduling interval, not a validity period.
refresh_secs = 180

# How long a stored rate remains usable after this service observes it.
#
# The service calculates:
#
#   expires_at = observed_at + stale_after_secs
#
# `expires_at` is not hardcoded in config. It is a derived database value.
stale_after_secs = 300

# Optional sanity limit for provider timestamps.
# If a provider returns source_updated_at older than this value, the rate can
# be rejected or quarantined.
max_source_age_secs = 900

# Maximum number of provider requests running at the same time.
max_concurrent_requests = 8

# Whether one failed asset/provider should stop the whole refresh cycle.
# false is recommended for background services.
fail_fast = false

# How multiple feeds for the same asset are handled.
#
# Allowed values:
# - priority: try feeds by priority and store the first successful result
# - all:      fetch all feeds and store every successful provider result
# - median:   fetch all successful feeds and store the median selected rate
selection = "priority"

# Optional: restrict to specific shared assets by ID.
# When set, only these assets from [assets] are resolved.
# asset_ids = ["eth", "usdc_base", "sol"]

[oracles.table]
# Database table used for current accepted rates.
name = "oracle_rates"

# Write behavior for accepted rates.
#
# Allowed values:
# - upsert: keep only the latest accepted row per asset/quote/provider
# - append: insert every accepted observation as a new row
write_mode = "upsert"

[oracles.table.columns]
# Column name overrides (all optional — defaults shown).
id = "id"
asset_id = "asset_id"
chain_id = "chain_id"
caip2 = "caip2"
symbol = "symbol"
quote = "quote"
provider = "provider"
rate = "rate"
source_updated_at = "source_updated_at"
observed_at = "observed_at"
expires_at = "expires_at"

# ─────────────────────────────────────────────────────────────────────────────
# Oracle safety
# ─────────────────────────────────────────────────────────────────────────────
#
# Safety checks run before a candidate rate becomes active.
#
# Suspicious rates should normally be quarantined, not immediately accepted.
# Notifications are useful, but notifications alone are not security.

[oracles.safety]
# Whether safety checks are enabled globally.
enabled = true

# Which previous rate is used for comparison.
#
# Allowed values:
# - last_accepted: compare against the last accepted active rate
# - last_observed: compare against the latest observed candidate/event
compare_against = "last_accepted"

# Default action when a candidate rate fails a safety check.
#
# Allowed values:
# - alert:         accept the rate and emit an alert
# - quarantine:    store the event but do not publish as active
# - reject:        discard the candidate rate
# - disable_asset: temporarily disable the asset until manual review
default_action = "quarantine"

# Default maximum allowed percentage change between accepted updates.
# Asset-specific values can override this.
max_change_pct = "50"

# Optional global minimum accepted rate.
# Asset-specific values can override this.
min_rate = "0.00000001"

# Optional global maximum accepted rate.
# Omit or comment out to disable the global upper bound.
# max_rate = "1000000"

# Maximum allowed age for provider-supplied timestamps.
max_source_age_secs = 900

# Suppress repeated alerts for the same asset/provider/reason.
alert_cooldown_secs = 3600

# Whether rejected/quarantined candidate rates should be recorded as events.
record_anomalies = true

[oracles.safety.bootstrap]
# What to do when no previous accepted rate exists.
#
# Allowed values:
# - accept
# - quarantine
# - require_multiple_providers
missing_previous_rate = "accept"

[oracles.safety.consensus]
# Minimum number of successful feeds required before accepting a rate.
# Use 1 for simple mode.
# Use 2+ when you want stronger provider agreement.
min_successful_feeds = 1

# Maximum allowed spread between successful providers.
# Only applies when multiple providers return rates.
max_provider_spread_pct = "5"

# Action when provider disagreement is too large.
# Allowed values: alert, quarantine, reject
action = "quarantine"

# ─────────────────────────────────────────────────────────────────────────────
# Oracle events
# ─────────────────────────────────────────────────────────────────────────────
#
# Events are an audit trail of important oracle decisions.
#
# Examples:
# - oracle.rate_anomaly
# - oracle.rate_quarantined
# - oracle.rate_rejected
# - oracle.provider_failed
# - oracle.refresh_failed
#
# Event delivery is handled by sinks such as log, table, Telegram, and webhook.

[oracles.events]
# Whether event recording/routing is enabled.
enabled = true

# Event delivery mode.
#
# Allowed values:
# - simple: write the event, then try to deliver notifications immediately
# - outbox: write the event and pending deliveries transactionally, then dispatch later
mode = "outbox"

# Store ID from the [stores] section used for event/audit tables.
store = "oracles"

# Whether oracle events should be stored in a durable audit table.
record = true

# Table used for durable event records.
table = "oracle_events"

# Whether sink failure should fail the oracle refresh cycle.
# false is strongly recommended.
sink_fail_fast = false

[oracles.events.columns]
# Column name overrides (all optional — defaults shown).
id = "id"
event_type = "event_type"
asset_id = "asset_id"
chain_id = "chain_id"
symbol = "symbol"
quote = "quote"
provider = "provider"
previous_rate = "previous_rate"
candidate_rate = "candidate_rate"
change_pct = "change_pct"
action = "action"
reason = "reason"
source_updated_at = "source_updated_at"
observed_at = "observed_at"

# Event routing rules: map event types to sink names.
[[oracles.events.routes]]
event = "oracle.rate_anomaly"
sinks = ["ops_log"]

[[oracles.events.routes]]
event = "oracle.rate_quarantined"
sinks = ["ops_log"]

[[oracles.events.routes]]
event = "oracle.rate_rejected"
sinks = ["ops_log"]

[[oracles.events.routes]]
event = "oracle.provider_failed"
sinks = ["ops_log"]

# ─────────────────────────────────────────────────────────────────────────────
# Outbox (reliable delivery)
# ─────────────────────────────────────────────────────────────────────────────
#
# The outbox pattern is recommended for reliable notifications.
#
# In outbox mode, the service writes:
# - the oracle decision
# - the event record
# - the pending notification delivery
#
# in durable storage before attempting external delivery.

[oracles.outbox]
# Whether durable notification delivery is enabled.
enabled = true

# Store ID from the [stores] section.
store = "oracles"

# Table used for pending notification deliveries.
table = "oracle_outbox"

# How often the dispatcher checks for pending deliveries.
dispatch_interval_secs = 10

# Maximum number of attempts per delivery.
max_retries = 5

# Retry backoff in seconds.
retry_backoff_secs = 30

# Maximum time to wait when sending a notification.
request_timeout_secs = 10

[oracles.outbox.columns]
# Column name overrides (all optional — defaults shown).
id = "id"
event_id = "event_id"
sink = "sink"
payload = "payload"
status = "status"
attempts = "attempts"
next_attempt_at = "next_attempt_at"
delivered_at = "delivered_at"
last_error = "last_error"

# ─────────────────────────────────────────────────────────────────────────────
# Event sinks
# ─────────────────────────────────────────────────────────────────────────────
#
# Sinks use canonical universal array entries. Every sink requires an `id` and
# `kind`; `transport` may reference [transports.webhook] profiles.

[[oracles.events.sinks]]
id = "ops_log"
kind = "log"
level = "warn"

# Telegram and webhook sinks require feature flags:
#
# | Sink     | Cargo feature      | Default? |
# |----------|--------------------|----------|
# | log      | (always available) | yes      |
# | table    | (always available) | yes      |
# | telegram | `telegram`         | no       |
# | webhook  | `webhook`          | no       |
#
# Compile with:
#
#   cargo run --features full -- --config Config.toml
#
# or:
#
#   cargo install oracles --features full


# ─────────────────────────────────────────────────────────────────────────────
# Oracle providers
# ─────────────────────────────────────────────────────────────────────────────
#
# Providers define reusable fetching/parsing behavior.
# Assets attach to providers through feeds under [oracles.assets.<id>]
# or through [[assets.<id>.feeds]].

[oracles.providers.static]
# Provider adapter kind.
# `static` reads params.rate directly from an asset feed.
kind = "static"

[oracles.providers.diadata]
# Provider adapter kind.
# `http_json` means the service makes an HTTP request and parses a JSON response.
kind = "http_json"

# HTTP method.
method = "GET"

# URL template.
# Values from feed params are substituted into placeholders.
url_template = "https://api.diadata.org/v1/assetQuotation/{blockchain}/{address}"

# Optional: reference a universal HTTP transport profile.
# transport = "default"

[oracles.providers.diadata.paths]
# JSON path to the decimal rate in the response.
rate = "Price"

# JSON path to the provider timestamp in the response.
source_updated_at = "Time"

[oracles.providers.diadata.formats]
# Format of the provider timestamp.
# Allowed examples: rfc3339, unix, unix_ms
source_updated_at = "rfc3339"

[oracles.providers.coingecko_coin]
# Provider adapter kind.
kind = "http_json"

# HTTP method.
method = "GET"

# URL template for coin prices by CoinGecko coin ID.
# `quote_lower` is derived from [oracles].quote.
url_template = "https://api.coingecko.com/api/v3/simple/price?ids={coin_id}&vs_currencies={quote_lower}&include_last_updated_at=true"

[oracles.providers.coingecko_coin.auth]
# Header name used for the API key.
header = "x-cg-demo-api-key"

# Environment variable containing the API key.
#
# Runtime note:
# Feeds using this provider require COINGECKO_API_KEY to be set.
# For a no-secret local test, disable CoinGecko feeds or use static feeds.
value_env = "COINGECKO_API_KEY"

[oracles.providers.coingecko_coin.paths]
# JSON path to the decimal rate in the response.
rate = "{coin_id}.{quote_lower}"

# JSON path to the provider timestamp in the response.
source_updated_at = "{coin_id}.last_updated_at"

[oracles.providers.coingecko_coin.formats]
# Format of the provider timestamp.
source_updated_at = "unix"

[oracles.providers.coingecko_token]
# Provider adapter kind.
kind = "http_json"

# HTTP method.
method = "GET"

# URL template for token prices by platform and contract address.
# `address_lower` is derived from the feed param named `address`.
url_template = "https://api.coingecko.com/api/v3/simple/token_price/{platform}?contract_addresses={address_lower}&vs_currencies={quote_lower}&include_last_updated_at=true"

[oracles.providers.coingecko_token.auth]
# Header name used for the API key.
header = "x-cg-demo-api-key"

# Environment variable containing the API key.
#
# Runtime note:
# Feeds using this provider require COINGECKO_API_KEY to be set.
# For a no-secret local test, disable CoinGecko feeds or use static feeds.
value_env = "COINGECKO_API_KEY"

[oracles.providers.coingecko_token.paths]
# JSON path to the decimal rate in the response.
rate = "{address_lower}.{quote_lower}"

# JSON path to the provider timestamp in the response.
source_updated_at = "{address_lower}.last_updated_at"

[oracles.providers.coingecko_token.formats]
# Format of the provider timestamp.
source_updated_at = "unix"

# ─────────────────────────────────────────────────────────────────────────────
# Oracle-specific asset feeds
# ─────────────────────────────────────────────────────────────────────────────
#
# Feeds can be defined two ways:
# 1. On the shared asset: [[assets.<id>.feeds]]
# 2. Under the oracles namespace: [[oracles.assets.<id>.feeds]] (recommended
#    for universal config because it keeps feed logic package-local)
#
# When [oracles.assets.<id>] is present, its feeds are used instead of
# shared [[assets.<id>.feeds]]. The shared [assets.<id>] still provides
# identity metadata (chain, symbol, decimals).

[oracles.assets.eth]
enabled = true

[[oracles.assets.eth.feeds]]
enabled = true
provider = "diadata"
priority = 100
params = { blockchain = "Ethereum", address = "0x0000000000000000000000000000000000000000" }

[[oracles.assets.eth.feeds]]
enabled = true
provider = "coingecko_coin"
priority = 50
params = { coin_id = "ethereum" }


[oracles.assets.usdc_base]
enabled = true

[[oracles.assets.usdc_base.feeds]]
enabled = true
provider = "static"
priority = 100
params = { rate = "1.00000000" }

[[oracles.assets.usdc_base.feeds]]
enabled = true
provider = "coingecko_token"
priority = 50
params = { platform = "base", address = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913" }


[oracles.assets.sol]
enabled = true

[[oracles.assets.sol.feeds]]
enabled = true
provider = "coingecko_coin"
priority = 100
params = { coin_id = "solana" }
